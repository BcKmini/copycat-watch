name: CI/CD

# main push → 테스트 통과 시 Cloud Run 자동 배포. PR은 테스트만. 수동 실행도 가능.
on:
  push:
    branches: [main]
    # 문서만 바꾼 push는 빌드/배포를 돌리지 않는다(불필요한 배포·비용 방지).
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# 같은 브랜치 실행이 진행 중이면 큐잉한다(배포가 서로 겹쳐 레이스 나는 것 방지).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: 테스트 (backend pytest · frontend lint·build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 백엔드 의존성 설치
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: 백엔드 테스트 (pytest)
        working-directory: backend
        run: pytest tests/ -q

      - name: Node 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 프론트엔드 설치
        working-directory: frontend
        run: npm ci

      - name: 프론트엔드 lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: 프론트엔드 빌드
        working-directory: frontend
        run: npm run build

  deploy:
    name: Cloud Run 배포
    needs: test
    # PR에서는 배포하지 않는다. main push 또는 수동 실행일 때만.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # WIF 토큰 발급에 필요
    steps:
      - uses: actions/checkout@v4

      - name: GCP 인증 (Workload Identity Federation · 키 없음)
        uses: google-github-actions/auth@v2
        with:
          project_id: kt-a-502310
          workload_identity_provider: projects/655097859028/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deployer@kt-a-502310.iam.gserviceaccount.com

      - name: gcloud 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: Cloud Run 배포 (레포 루트 Dockerfile · Cloud Build)
        id: deploy
        run: |
          gcloud run deploy copycat-watch \
            --source . \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --memory 3Gi --cpu 4 --cpu-boost \
            --timeout 300 --concurrency 1 \
            --min-instances 0 --max-instances 6 \
            --set-secrets "GOOGLE_VISION_API_KEY=google-vision-api-key:latest" \
            --quiet
          URL=$(gcloud run services describe copycat-watch --region asia-northeast3 --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: 배포 후 헬스체크 (실패 시 파이프라인 실패)
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          ok=0
          # 콜드스타트를 감안해 재시도. 프론트(nginx) 200 + 백엔드 프록시가 5xx가 아닌지 확인.
          for i in $(seq 1 12); do
            root=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            api=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/demo-image/__healthcheck__.jpg")
            echo "attempt $i: root=$root api=$api"
            if [ "$root" = "200" ] && [ -n "$api" ] && [ "$api" != "502" ] && [ "$api" != "503" ]; then
              ok=1; break
            fi
            sleep 6
          done
          if [ "$ok" != "1" ]; then
            echo "::error::배포 후 서비스가 정상 응답하지 않습니다"; exit 1
          fi
          echo "서비스 정상 확인됨"

      - name: 배포 요약
        if: always()
        run: |
          {
            echo "### Cloud Run 배포"
            echo ""
            echo "- 서비스 URL: ${{ steps.deploy.outputs.url }}"
            echo "- 리비전 트리거: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
