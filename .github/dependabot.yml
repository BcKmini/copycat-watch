# 의존성·GitHub Actions 버전을 주기적으로 최신·보안 패치로 유지(PR 자동 생성).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
