apiVersion: apps/v1
kind: Deployment
metadata:
  name: copycat-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: copycat-backend
  template:
    metadata:
      labels:
        app: copycat-backend
    spec:
      containers:
        - name: backend
          image: copycat-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: copycat-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: copycat-backend
spec:
  selector:
    app: copycat-backend
  ports:
    - port: 8000
      targetPort: 8000
