server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 상품 사진은 흔히 1MB를 넘고 다중 이미지(최대 5장)까지 올리므로 업로드 상한을 넉넉히 둔다.
    # (nginx 기본 1MB면 사진 업로드가 413으로 막힌다. 백엔드는 파일당 10MB를 검사한다.)
    client_max_body_size 60M;

    # /api 요청은 같은 컨테이너의 uvicorn으로 프록시
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        # 이미지 스캔은 외부 API 호출 + 서버 실측 검증으로 오래 걸릴 수 있다
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # index.html은 캐시하지 않는다 - 재배포 시 옛 번들을 가리키면 앱이 깨진다
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 콘텐츠 해시가 붙은 정적 자산은 영구 캐시 가능
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
